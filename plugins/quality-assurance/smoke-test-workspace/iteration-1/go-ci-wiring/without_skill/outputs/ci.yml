name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/quality-assurance/skills/smoke-test/evals/fixtures/go-http-app
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: plugins/quality-assurance/skills/smoke-test/evals/fixtures/go-http-app/go.sum

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod / go.sum not tidy"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt issues in:"
            echo "$out"
            exit 1
          fi

      - name: build
        run: go build -v ./...

      - name: test
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: plugins/quality-assurance/skills/smoke-test/evals/fixtures/go-http-app/coverage.out
          if-no-files-found: ignore
