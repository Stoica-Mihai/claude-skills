# .github/workflows/smoke.yml
#
# Build-verification (smoke) gate for the Go HTTP API.
# Runs on every PR targeting main; failure blocks the PR.
#
# IMPORTANT: GitHub Actions only *reports* status — to actually block merge,
# add this job ("smoke") to the branch-protection "Require status checks to
# pass before merging" list for the main branch (Settings → Branches →
# Branch protection rules → main → Require status checks).
name: smoke

on:
  pull_request:
    branches: [main]
    # Trigger on any PR change; cheap because the suite is <2 min.
  push:
    branches: [main]
    # Also run on merge-to-main so the badge reflects trunk health.

# Cancel in-flight runs on the same PR/branch when a newer commit lands.
concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke (go-http-app)
    runs-on: ubuntu-latest
    # Hard cap — smoke is supposed to be <2 min. If it runs longer, treat
    # the suite itself as broken, not the build.
    timeout-minutes: 5
    defaults:
      run:
        # Path to the Go HTTP API fixture inside this repo.
        working-directory: plugins/quality-assurance/skills/smoke-test/evals/fixtures/go-http-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: plugins/quality-assurance/skills/smoke-test/evals/fixtures/go-http-app/go.mod
          # No go.sum yet (stdlib-only fixture), so module cache is a no-op.
          cache: false

      - name: Verify build (vet + compile)
        run: |
          go vet ./...
          go build ./...

      - name: Run smoke suite
        # `-tags smoke` enables the //go:build smoke gated file.
        # `-count=1` disables the test cache so every PR run is honest.
        # `-timeout 90s` is a hard wall-clock budget at the test-runner level.
        # In-process httptest server is used when SMOKE_BASE_URL is unset.
        env:
          SMOKE_TOKEN: ci-smoke-token
        run: go test -tags smoke -run TestSmoke -v -count=1 -timeout 90s ./...
